# ==============================
# Application Info
# ==============================
spring.application.name=Ecommerce-SpringBoot
server.port=8080

# ==============================
# MySQL DataSource
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# Thymeleaf
# ==============================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==============================
# File Upload Config
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory (relative to project root; change for production)
app.upload.dir=uploads/products

# ==============================
# Spring Security (custom form login; disable CSRF for simplicity)
# ==============================
# We handle security via SecurityConfig.java

# ==============================
# Data SQL (admin seeding)
# ==============================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==============================
# Logging
# ==============================
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n
