<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin Login – EcommerceHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">
<div class="auth-card">
    <div class="auth-left">
        <div class="brand-logo">🛡️</div>
        <h2 class="brand-name">Admin Portal</h2>
        <p class="brand-sub">Platform management</p>

        <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

        <form th:action="@{/admin/login}" th:object="${loginDto}" method="post" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{email}" placeholder="admin" required/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="••••••••" required/>
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <div class="auth-footer">
            <a th:href="@{/}" class="link muted">← Back to Home</a>
        </div>
    </div>
    <div class="auth-right admin-gradient">
        <div class="auth-illustration">
            <div class="big-icon">🛡️</div>
            <p>Manage sellers, buyers &amp;<br/>order confirmations.</p>
        </div>
    </div>
</div>
</body>
</html>
