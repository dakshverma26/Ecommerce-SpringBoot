<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin Register – EcommerceHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">
<div class="auth-card">
    <div class="auth-left">
        <div class="brand-logo">🛡️</div>
        <h2 class="brand-name">Create Admin</h2>
        <p class="brand-sub">Register a new admin account</p>

        <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

        <form th:action="@{/admin/register}" th:object="${adminDto}" method="post" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="e.g. superadmin" required/>
                <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="Min. 4 characters" required/>
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Admin Account</button>
        </form>
        <div class="auth-footer">
            <span>Already have an account? </span>
            <a th:href="@{/admin/login}" class="link">Login</a>
        </div>
        <div class="auth-footer">
            <a th:href="@{/}" class="link muted">← Back to Home</a>
        </div>
    </div>
    <div class="auth-right admin-gradient">
        <div class="auth-illustration">
            <div class="big-icon">🔐</div>
            <p>Secure admin access.<br/>Manage the entire platform.</p>
        </div>
    </div>
</div>
</body>
</html>
