<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkout – EcommerceHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="app-body">
<nav class="app-nav">
    <div class="nav-brand">🛍️ EcommerceHub</div>
    <div class="nav-user">
        <span th:text="${buyerName}"></span>
        <a th:href="@{/logout}" class="btn btn-sm btn-outline">Logout</a>
    </div>
</nav>

<div class="app-container narrow">
    <h1 class="page-title">✅ Review &amp; Confirm Order</h1>

    <!-- Payment Information -->
    <div class="info-card" style="background: #e3f2fd; border-left: 4px solid #2196f3; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;">
        <strong>💳 Secure Payment via Razorpay</strong>
        <p style="margin: 4px 0 0;">Review your items below and click <strong>Pay with Razorpay</strong> to proceed.</p>
    </div>

    <div class="order-summary">
        <h3>Order Summary</h3>
        <div class="order-item" th:each="item : ${cart}">
            <span th:text="${item.productName} + ' × ' + ${item.quantity}"></span>
            <span th:text="'₹' + ${item.subtotal}"></span>
        </div>
        <div class="order-total">
            <strong>Total Amount</strong>
            <strong th:text="'₹' + ${total}"></strong>
        </div>
    </div>

    <div class="form-actions">
        <a th:href="@{/buyer/cart}" class="btn btn-outline">← Back to Cart</a>
        <button id="rzp-button" class="btn btn-primary">Pay with Razorpay</button>
    </div>

    <!-- Hidden form to post to backend after successful payment -->
    <form id="razorpay-success-form" th:action="@{/buyer/order/verify-and-place}" method="post" style="display:none;">
        <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
        <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
        <input type="hidden" name="razorpay_signature" id="razorpay_signature">
    </form>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script th:inline="javascript">
        var buyerName = /*[[${buyerName}]]*/ 'Buyer';
        var razorpayKey = /*[[${@environment.getProperty('key.id')}]]*/ 'rzp_test_key';
        
        document.getElementById('rzp-button').onclick = function(e) {
            e.preventDefault();
            this.disabled = true;
            this.innerText = 'Creating Order...';

            fetch('/api/payment/create-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => {
                if(!res.ok) throw new Error('Order creation failed');
                return res.json();
            })
            .then(data => {
                var options = {
                    "key": razorpayKey,
                    "amount": data.amount,
                    "currency": data.currency,
                    "name": "EcommerceHub",
                    "description": "Purchase Order",
                    "order_id": data.id,
                    "handler": function (response){
                        document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                        document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
                        document.getElementById('razorpay_signature').value = response.razorpay_signature;
                        document.getElementById('razorpay-success-form').submit();
                    },
                    "prefill": {
                        "name": buyerName
                    },
                    "theme": {
                        "color": "#4caf50"
                    }
                };
                var rzp = new Razorpay(options);
                rzp.on('payment.failed', function (response){
                    alert("Payment Failed: " + response.error.description);
                });
                rzp.open();
                
                document.getElementById('rzp-button').disabled = false;
                document.getElementById('rzp-button').innerText = 'Pay with Razorpay';
            })
            .catch(err => {
                alert(err.message);
                document.getElementById('rzp-button').disabled = false;
                document.getElementById('rzp-button').innerText = 'Pay with Razorpay';
            });
        }
    </script>
</div>
</body>
</html>
