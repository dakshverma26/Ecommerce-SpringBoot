<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Checkout – EcommerceHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="app-body">
<nav class="app-nav">
    <div class="nav-brand">🛍️ EcommerceHub</div>
    <div class="nav-user">
        <span th:text="${buyerName}"></span>
        <a th:href="@{/logout}" class="btn btn-sm btn-outline">Logout</a>
    </div>
</nav>

<div class="app-container narrow">
    <h1 class="page-title">✅ Review &amp; Confirm Order</h1>

    <!-- Payment gateway is DISABLED — orders go directly to confirmed status -->
    <div class="info-card" style="background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;">
        <strong>🎉 No payment required!</strong>
        <p style="margin: 4px 0 0;">Review your items below and click <strong>Confirm Order</strong> to place it instantly.</p>
    </div>

    <div class="order-summary">
        <h3>Order Summary</h3>
        <div class="order-item" th:each="item : ${cart}">
            <span th:text="${item.productName} + ' × ' + ${item.quantity}"></span>
            <span th:text="'₹' + ${item.subtotal}"></span>
        </div>
        <div class="order-total">
            <strong>Total Amount</strong>
            <strong th:text="'₹' + ${total}"></strong>
        </div>
    </div>

    <div class="form-actions">
        <a th:href="@{/buyer/cart}" class="btn btn-outline">← Back to Cart</a>
        <form th:action="@{/buyer/order/place}" method="post" style="display:inline">
            <button type="submit" id="btn-confirm-order" class="btn btn-primary">✅ Confirm Order</button>
        </form>
    </div>
</div>
</body>
</html>
