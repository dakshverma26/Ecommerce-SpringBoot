<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Seller Login – EcommerceHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">
<div class="auth-card">
    <div class="auth-left">
        <div class="brand-logo">📦</div>
        <h2 class="brand-name">Seller Center</h2>
        <p class="brand-sub">Grow your business with us</p>

        <!-- Flash messages -->
        <div class="alert alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>
        <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

        <form th:action="@{/seller/login}" th:object="${loginDto}" method="post" class="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" placeholder="seller@email.com" required/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="••••••••" required/>
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <div class="auth-footer">
            <span>Don't have an account? </span>
            <a th:href="@{/seller/register}" class="link">Register</a>
        </div>
        <div class="auth-footer">
            <a th:href="@{/}" class="link muted">← Back to Home</a>
        </div>
    </div>
    <div class="auth-right seller-gradient">
        <div class="auth-illustration">
            <div class="big-icon">📦</div>
            <p>List products. Earn revenue.<br/>Your seller dashboard awaits.</p>
        </div>
    </div>
</div>
</body>
</html>
